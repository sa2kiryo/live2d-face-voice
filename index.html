<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live2D Face &amp; Voice</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" id="stage" aria-label="Live2D stage">
        <canvas id="live2d-canvas"></canvas>
        <div class="load-overlay" id="load-overlay">
          <div class="loader"></div>
          <span id="load-message">Live2D を読み込み中</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="Controls">
        <header class="panel-header">
          <div>
            <p class="eyebrow" id="model-label">Luna</p>
            <h1>Face &amp; Voice</h1>
          </div>
          <button class="ghost-button" id="reset-pose" type="button">リセット</button>
        </header>

        <div class="status-grid" aria-label="Status">
          <div class="status-chip" id="runtime-status" data-state="loading">
            <span>Runtime</span>
            <strong>Loading</strong>
          </div>
          <div class="status-chip" id="model-status" data-state="loading">
            <span>Model</span>
            <strong>Loading</strong>
          </div>
          <div class="status-chip" id="audio-status" data-state="idle">
            <span>Audio</span>
            <strong>Idle</strong>
          </div>
        </div>

        <section class="control-section" aria-labelledby="audio-heading">
          <div class="section-title">
            <h2 id="audio-heading">録音</h2>
            <button class="text-button" id="audio-clear" type="button">解除</button>
          </div>
          <input id="audio-file" type="file" accept="audio/*" hidden />
          <div class="audio-buttons">
            <button class="secondary-button" id="audio-pick" type="button">音声を選ぶ</button>
            <button class="primary-button" id="audio-play" type="button" disabled>再生</button>
            <button class="secondary-button" id="audio-stop" type="button" disabled>停止</button>
          </div>
          <p class="audio-meta" id="audio-meta" aria-live="polite">未読込</p>
          <div class="audio-buttons audio-analyze-row">
            <button class="secondary-button" id="audio-analyze" type="button" disabled>解析</button>
            <label class="toggle-control" id="emotion-mode-label">
              <input id="emotion-mode" type="checkbox" disabled />
              <span>感情付き再生</span>
            </label>
          </div>
          <div class="audio-buttons audio-export-row">
            <button class="secondary-button" id="audio-export-mp4" type="button" disabled>MP4保存</button>
            <span class="recording-indicator" id="recording-indicator" hidden>
              <span class="recording-dot" aria-hidden="true"></span>
              <span id="recording-timer">0:00</span>
            </span>
          </div>
          <p class="audio-meta" id="analysis-meta" aria-live="polite" hidden></p>
          <details id="transcript-panel" hidden>
            <summary>トランスクリプト</summary>
            <ol id="transcript-list"></ol>
          </details>
        </section>

        <section class="control-section" aria-labelledby="expression-heading">
          <div class="section-title">
            <h2 id="expression-heading">表情</h2>
            <button class="text-button" id="clear-expression" type="button">解除</button>
          </div>
          <div class="expression-grid" id="expression-grid"></div>
        </section>

        <section class="control-section" aria-labelledby="background-heading">
          <div class="section-title">
            <h2 id="background-heading">背景</h2>
            <label class="color-control">
              <span>カスタム</span>
              <input id="background-custom" type="color" value="#111412" aria-label="カスタム背景色" />
            </label>
          </div>
          <div class="background-grid" id="background-presets" aria-label="背景色">
            <button class="background-swatch" data-background-color="#111412" type="button" aria-pressed="true" style="--swatch-color: #111412">
              <span class="swatch-chip" aria-hidden="true"></span>
              <span>ダーク</span>
            </button>
            <button class="background-swatch" data-background-color="#00ff00" type="button" aria-pressed="false" style="--swatch-color: #00ff00">
              <span class="swatch-chip" aria-hidden="true"></span>
              <span>グリーン</span>
            </button>
            <button class="background-swatch" data-background-color="#0047ff" type="button" aria-pressed="false" style="--swatch-color: #0047ff">
              <span class="swatch-chip" aria-hidden="true"></span>
              <span>ブルー</span>
            </button>
            <button class="background-swatch" data-background-color="#ffffff" type="button" aria-pressed="false" style="--swatch-color: #ffffff">
              <span class="swatch-chip" aria-hidden="true"></span>
              <span>ホワイト</span>
            </button>
          </div>
        </section>

        <section class="control-section" aria-labelledby="pose-heading">
          <h2 id="pose-heading">向き</h2>
          <label class="range-control">
            <span>体向き</span>
            <input id="body-turn" type="range" min="-10" max="10" step="0.5" value="0" />
            <output id="body-turn-value">0.0</output>
          </label>
          <label class="range-control">
            <span>顔向き</span>
            <input id="head-turn-assist" type="range" min="-30" max="30" step="0.5" value="0" />
            <output id="head-turn-assist-value">0.0</output>
          </label>
        </section>

        <p class="error-box" id="error-box" hidden></p>
      </aside>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
